<!doctype html>
<html lang="en" class="light-mode">
<head>
<meta charset="utf-8" />
<title>Picture card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="components.css" />
</head>
<body style="margin:0;padding:16px;background:var(--background-page);">
  <div class="zx-picture-card" style="max-width:260px;">
    <div class="zx-picture-card__panel">
      <div class="zx-picture-card__image">
        <!-- pixel-art placeholder -->
        <svg viewBox="0 0 32 24" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block;image-rendering:pixelated;">
          <rect width="32" height="24" fill="#000033"/>
          <rect x="0" y="16" width="32" height="8" fill="#aa0000"/>
          <rect x="2" y="13" width="2" height="3" fill="#ffaa00"/>
          <rect x="6" y="11" width="2" height="5" fill="#ffaa00"/>
          <rect x="10" y="14" width="3" height="2" fill="#ffaa00"/>
          <rect x="14" y="9" width="2" height="7" fill="#ffaa00"/>
          <rect x="18" y="12" width="2" height="4" fill="#ffaa00"/>
          <rect x="22" y="10" width="2" height="6" fill="#ffaa00"/>
          <rect x="26" y="13" width="2" height="3" fill="#ffaa00"/>
          <rect x="4" y="2" width="1" height="1" fill="#ffffff"/>
          <rect x="14" y="4" width="1" height="1" fill="#ffffff"/>
          <rect x="22" y="3" width="1" height="1" fill="#ffffff"/>
          <rect x="28" y="6" width="1" height="1" fill="#ffffff"/>
        </svg>
        <div class="zx-picture-card__badges">
          <span class="zx-badge zx-badge--secondary">.SCR</span>
          <span class="zx-badge zx-badge--secondary">128k</span>
        </div>
      </div>
      <div class="zx-picture-card__info">
        <a class="zx-picture-card__title" href="#">Eternal Flame</a>
        <div class="zx-picture-card__authors"><a href="#">Diver/4D</a></div>
        <div class="zx-picture-card__party">
          <span class="zx-medal zx-medal--gold">1</span>
          <a href="#">Chaos Constructions 2003</a>
        </div>
        <div class="zx-picture-card__bottom">
          <span class="zx-vote">
            <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26 6.91 1-5 4.87L18.18 22 12 18.27 5.82 22l1.18-7.87-5-4.87 6.91-1z"/></svg>
            <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26 6.91 1-5 4.87L18.18 22 12 18.27 5.82 22l1.18-7.87-5-4.87 6.91-1z"/></svg>
            <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26 6.91 1-5 4.87L18.18 22 12 18.27 5.82 22l1.18-7.87-5-4.87 6.91-1z"/></svg>
            <svg class="star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26 6.91 1-5 4.87L18.18 22 12 18.27 5.82 22l1.18-7.87-5-4.87 6.91-1z"/></svg>
            <svg class="star star--off" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26 6.91 1-5 4.87L18.18 22 12 18.27 5.82 22l1.18-7.87-5-4.87 6.91-1z"/></svg>
            <span class="count">42</span>
          </span>
          <span class="zx-picture-card__year">2003</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
