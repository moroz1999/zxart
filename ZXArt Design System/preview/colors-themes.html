<!doctype html>
<html lang="en" class="light-mode">
<head>
<meta charset="utf-8" />
<title>Dark mode preview</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; display: grid; grid-template-columns: 1fr 1fr; }
  .panel { padding: 16px; min-height: 130px; }
  .light { background: var(--background-page); color: var(--text-color); }
  .dark { background: var(--background-page); color: var(--text-color); }
  h3 { font-size: 18px; margin: 0 0 4px; }
  .muted { color: var(--text-light-color); font-size: 13px; margin-bottom: 8px; }
  .btn { display: inline-flex; align-items: center; height: 30px; padding: 0 12px; border-radius: 6px; background: var(--primary-500); color: var(--white); font-size: 13px; border: 0; }
  .card { margin-top: 8px; padding: 8px 12px; border: 1px solid var(--border-secondary); border-radius: 6px; background: var(--surface); font-size: 12px; }
</style>
</head>
<body>
  <div class="panel light">
    <h3>Light mode</h3>
    <div class="muted">.light-mode (default)</div>
    <button class="btn">Listen</button>
    <div class="card">"Eternal Flame" — Diver/4D · 2003</div>
  </div>
  <div class="panel dark dark-mode">
    <h3>Dark mode</h3>
    <div class="muted">.dark-mode</div>
    <button class="btn">Listen</button>
    <div class="card">"Eternal Flame" — Diver/4D · 2003</div>
  </div>
</body>
</html>
