<!doctype html>
<html lang="en" class="light-mode">
<head>
<meta charset="utf-8" />
<title>Badges & medals</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="components.css" />
</head>
<body style="margin:0;padding:16px;display:flex;flex-direction:column;gap:14px;">
  <div style="display:flex; gap:6px; flex-wrap:wrap; align-items:center;">
    <span class="zx-badge zx-badge--secondary">realtime</span>
    <span class="zx-badge zx-badge--secondary">flickering</span>
    <span class="zx-badge zx-badge--secondary">128k</span>
    <span class="zx-badge zx-badge--secondary">.scr</span>
    <span class="zx-badge zx-badge--primary">new</span>
    <span class="zx-badge zx-badge--primary">winner</span>
  </div>
  <div style="display:flex; gap:12px; align-items:center;">
    <span class="zx-medal zx-medal--gold">1</span>
    <span class="zx-medal zx-medal--silver">2</span>
    <span class="zx-medal zx-medal--bronze">3</span>
    <span class="zx-caption">Compo placings — Chaos Constructions 2003</span>
  </div>
</body>
</html>
