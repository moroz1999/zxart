<!doctype html>
<html lang="en" class="light-mode">
<head>
<meta charset="utf-8" />
<title>Tune row</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="components.css" />
</head>
<body style="margin:0;padding:16px;background:var(--background-page);">
  <div style="background:var(--surface);border:1px solid var(--border-secondary);border-radius:var(--radius-lg);overflow:hidden;">
    <div class="zx-tune-row">
      <button class="zx-tune-row__play" aria-label="Play"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
      <span class="zx-tune-row__title">Robocop</span>
      <span class="zx-tune-row__author">Tim Follin</span>
      <span class="zx-tune-row__chip">AY · 2:14</span>
    </div>
    <div class="zx-tune-row" style="background:var(--secondary-100);">
      <button class="zx-tune-row__play" aria-label="Pause"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg></button>
      <span class="zx-tune-row__title">Last V8</span>
      <span class="zx-tune-row__author">David Whittaker</span>
      <span class="zx-tune-row__chip">Beeper · 1:48</span>
    </div>
    <div class="zx-tune-row">
      <button class="zx-tune-row__play" aria-label="Play"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
      <span class="zx-tune-row__title">Aquaplane</span>
      <span class="zx-tune-row__author">Rob Hubbard</span>
      <span class="zx-tune-row__chip">AY · 3:02</span>
    </div>
  </div>
</body>
</html>
