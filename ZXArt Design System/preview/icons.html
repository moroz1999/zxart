<!doctype html>
<html lang="en" class="light-mode">
<head>
<meta charset="utf-8" />
<title>Icon set</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 16px; display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
  .icon-tile { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 4px; background: var(--surface); border: 1px solid var(--border-secondary); border-radius: var(--radius-md); color: var(--text-color); }
  .icon-tile img { width: 22px; height: 22px; }
  .icon-tile .name { font-size: 9px; color: var(--text-light-color); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="icon-tile"><img src="../assets/icons/play.svg" alt=""><span class="name">play</span></div>
  <div class="icon-tile"><img src="../assets/icons/pause.svg" alt=""><span class="name">pause</span></div>
  <div class="icon-tile"><img src="../assets/icons/skip-next.svg" alt=""><span class="name">next</span></div>
  <div class="icon-tile"><img src="../assets/icons/skip-previous.svg" alt=""><span class="name">prev</span></div>
  <div class="icon-tile"><img src="../assets/icons/shuffle.svg" alt=""><span class="name">shuffle</span></div>
  <div class="icon-tile"><img src="../assets/icons/repeat.svg" alt=""><span class="name">repeat</span></div>
  <div class="icon-tile"><img src="../assets/icons/search.svg" alt=""><span class="name">search</span></div>
  <div class="icon-tile"><img src="../assets/icons/menu.svg" alt=""><span class="name">menu</span></div>

  <div class="icon-tile"><img src="../assets/icons/star.svg" alt=""><span class="name">star</span></div>
  <div class="icon-tile"><img src="../assets/icons/favorite.svg" alt=""><span class="name">heart</span></div>
  <div class="icon-tile"><img src="../assets/icons/favorite-border.svg" alt=""><span class="name">heart-o</span></div>
  <div class="icon-tile"><img src="../assets/icons/download.svg" alt=""><span class="name">download</span></div>
  <div class="icon-tile"><img src="../assets/icons/check.svg" alt=""><span class="name">check</span></div>
  <div class="icon-tile"><img src="../assets/icons/close.svg" alt=""><span class="name">close</span></div>
  <div class="icon-tile"><img src="../assets/icons/expand-more.svg" alt=""><span class="name">expand</span></div>
  <div class="icon-tile"><img src="../assets/icons/chat.svg" alt=""><span class="name">chat</span></div>

  <div class="icon-tile"><img src="../assets/icons/music-note.svg" alt=""><span class="name">music</span></div>
  <div class="icon-tile"><img src="../assets/icons/image.svg" alt=""><span class="name">image</span></div>
  <div class="icon-tile"><img src="../assets/icons/videogame-asset.svg" alt=""><span class="name">game</span></div>
  <div class="icon-tile"><img src="../assets/icons/disc.svg" alt=""><span class="name">disc</span></div>
  <div class="icon-tile"><img src="../assets/icons/photo-camera.svg" alt=""><span class="name">camera</span></div>
  <div class="icon-tile"><img src="../assets/icons/person.svg" alt=""><span class="name">person</span></div>
  <div class="icon-tile"><img src="../assets/icons/globe.svg" alt=""><span class="name">globe</span></div>
  <div class="icon-tile"><img src="../assets/icons/settings.svg" alt=""><span class="name">settings</span></div>
</body>
</html>
