<!doctype html>
<html lang="en" class="light-mode">
<head>
<meta charset="utf-8" />
<title>Panels & cards</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="components.css" />
</head>
<body style="margin:0;padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;">
  <div class="zx-panel">
    <div class="zx-body-strong">Latest comments</div>
    <div class="zx-caption" style="margin-top:4px;">A standard panel — surface bg, thin border, soft shadow, 3px radius.</div>
  </div>
  <div class="zx-panel zx-panel--radius-xl zx-panel--padding-none" style="overflow:hidden;">
    <div style="height:60px;background:var(--secondary-200); display:flex;align-items:center;justify-content:center;color:var(--text-light-color);font-size:11px;">[ pixel art ]</div>
    <div style="padding:8px 12px;">
      <div class="zx-body-strong">Picture panel</div>
      <div class="zx-caption">12px radius, no padding — used for picture cards.</div>
    </div>
  </div>
</body>
</html>
