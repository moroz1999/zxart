<!doctype html>
<html lang="en" class="light-mode">
<head>
<meta charset="utf-8" />
<title>Header bar</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="components.css" />
</head>
<body style="margin:0;background:var(--background-page);">
  <div class="zx-header">
    <div class="zx-header__inner">
      <a class="zx-header__logo" href="#"><img src="../assets/logo.png" alt="zx-art"/></a>
      <nav class="zx-header__menu">
        <a href="#" class="active">Pictures</a>
        <a href="#">Music</a>
        <a href="#">Prods</a>
        <a href="#">Authors</a>
        <a href="#">Groups</a>
        <a href="#">Parties</a>
      </nav>
      <div class="zx-header__column">
        <button class="zx-button zx-button--sm zx-button--transparent zx-button--square" aria-label="Search">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 5 1.5-1.5-5-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
        </button>
        <button class="zx-button zx-button--sm zx-button--transparent zx-button--square" aria-label="Theme">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.39 5.39 0 0 1-4.4 2.26 5.4 5.4 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
        </button>
        <button class="zx-button zx-button--sm zx-button--outlined">EN</button>
        <button class="zx-button zx-button--sm zx-button--primary">Sign in</button>
      </div>
    </div>
  </div>
</body>
</html>
