<!doctype html>
<html lang="en" class="light-mode">
<head>
<meta charset="utf-8" />
<title>Letter selector</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="components.css" />
</head>
<body style="margin:0;padding:16px;">
  <div class="zx-letters">
    <a href="#">all</a>
    <a href="#">#</a>
    <a href="#">A</a><a href="#">B</a><a href="#">C</a><a href="#">D</a>
    <a href="#" class="active">E</a><a href="#">F</a><a href="#">G</a><a href="#">H</a>
    <a href="#">I</a><a href="#">J</a><a href="#">K</a><a href="#">L</a>
    <a href="#">M</a><a href="#">N</a><a href="#">O</a><a href="#">P</a>
    <a href="#" class="disabled">Q</a><a href="#">R</a><a href="#">S</a><a href="#">T</a>
    <a href="#">U</a><a href="#">V</a><a href="#">W</a><a href="#" class="disabled">X</a>
    <a href="#">Y</a><a href="#">Z</a>
  </div>
  <div style="margin-top:14px; display:flex; gap:6px; align-items:center; font-size:13px; color: var(--text-light-color);">
    Sort:
    <button class="zx-button zx-button--xs zx-button--primary">Newest</button>
    <button class="zx-button zx-button--xs zx-button--outlined">Top rated</button>
    <button class="zx-button zx-button--xs zx-button--outlined">A → Z</button>
  </div>
</body>
</html>
