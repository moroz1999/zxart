<!doctype html>
<html lang="en" class="light-mode">
<head>
<meta charset="utf-8" />
<title>Radius & shadow</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 16px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .tile { background: var(--surface); height: 70px; display: flex; align-items: end; justify-content: center; padding: 6px; font-family: var(--font-mono); font-size: 10px; color: var(--text-light-color); border: 1px solid var(--border-secondary); }
  .r-sm { border-radius: 2px; } .r-md { border-radius: 3px; }
  .r-lg { border-radius: 6px; } .r-xl { border-radius: 12px; }
  .s-sm { box-shadow: var(--shadow-sm); border-color: transparent; }
  .s-md { box-shadow: var(--shadow-md); border-color: transparent; }
  .s-lg { box-shadow: var(--shadow-lg); border-color: transparent; }
  .s-no { background: var(--surface); }
  .label { font-size: 11px; font-weight: 700; color: var(--text-color); text-align: center; margin-top: 4px; font-family: var(--font-sans); }
</style>
</head>
<body>
  <div><div class="tile r-sm">2px</div><div class="label">radius-sm</div></div>
  <div><div class="tile r-md">3px</div><div class="label">radius-md</div></div>
  <div><div class="tile r-lg">6px</div><div class="label">radius-lg</div></div>
  <div><div class="tile r-xl">12px</div><div class="label">radius-xl</div></div>
  <div><div class="tile r-lg s-sm">sm</div><div class="label">shadow-sm</div></div>
  <div><div class="tile r-lg s-md">md</div><div class="label">shadow-md</div></div>
  <div><div class="tile r-lg s-lg">lg</div><div class="label">shadow-lg</div></div>
  <div><div class="tile r-lg s-no">none</div><div class="label">flat</div></div>
</body>
</html>
