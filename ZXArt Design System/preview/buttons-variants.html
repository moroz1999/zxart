<!doctype html>
<html lang="en" class="light-mode">
<head>
<meta charset="utf-8" />
<title>Buttons — variants</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="components.css" />
</head>
<body style="margin:0;padding:16px;display:flex;flex-direction:column;gap:12px;">
  <div style="display:flex; gap:8px; flex-wrap:wrap;">
    <button class="zx-button zx-button--md zx-button--primary">Listen</button>
    <button class="zx-button zx-button--md zx-button--secondary">Filter</button>
    <button class="zx-button zx-button--md zx-button--outlined">Cancel</button>
    <button class="zx-button zx-button--md zx-button--transparent">More</button>
    <button class="zx-button zx-button--md zx-button--danger">Delete</button>
  </div>
  <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
    <button class="zx-button zx-button--xs zx-button--primary">XS</button>
    <button class="zx-button zx-button--sm zx-button--primary">Small</button>
    <button class="zx-button zx-button--md zx-button--primary">Medium</button>
    <button class="zx-button zx-button--md zx-button--primary" disabled>Disabled</button>
  </div>
</body>
</html>
