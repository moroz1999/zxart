<!doctype html>
<html lang="en" class="light-mode">
<head>
<meta charset="utf-8" />
<title>Buttons — sizes & states</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="components.css" />
</head>
<body style="margin:0;padding:16px;display:flex;flex-direction:column;gap:12px;">
  <div style="display:flex; gap:8px; align-items:center;">
    <button class="zx-button zx-button--md zx-button--primary zx-button--round" aria-label="Play">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="zx-button zx-button--md zx-button--secondary zx-button--square" aria-label="Menu">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/></svg>
    </button>
    <button class="zx-button zx-button--md zx-button--outlined zx-button--square" aria-label="Search">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 5 1.5-1.5-5-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
    </button>
    <button class="zx-button zx-button--md zx-button--primary">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6z"/></svg>
      Add tune
    </button>
  </div>
  <div style="display:flex; gap:8px;">
    <button class="zx-button zx-button--xs zx-button--outlined">.AY</button>
    <button class="zx-button zx-button--xs zx-button--outlined">.SQT</button>
    <button class="zx-button zx-button--xs zx-button--outlined">.PT3</button>
    <button class="zx-button zx-button--xs zx-button--primary">.STC</button>
  </div>
</body>
</html>
