<!doctype html>
<html lang="en" class="light-mode">
<head>
<meta charset="utf-8" />
<title>Player bar</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="components.css" />
<style>
  body { margin: 0; padding: 16px; background: var(--background-page); display: flex; flex-direction: column; gap: 14px; }
  .label { font-size: 11px; color: var(--text-light-color); font-family: var(--font-mono); margin-bottom: 4px; }
  .player-wrap { max-width: 960px; }
  .zx-player { border-radius: var(--radius-lg); border: 1px solid var(--secondary-200); }

  /* Expanded panel — filters / radio criteria */
  .player-advanced {
    background: var(--surface);
    border: 1px solid var(--secondary-200);
    border-top: 0;
    border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    box-shadow: var(--shadow-md);
    padding: 12px 16px 16px;
    margin-top: -1px;
  }
  .player-presets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .player-advanced-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px 16px;
  }
  .player-field { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .player-field-label { font-size: 11px; color: var(--text-light-color); }
  .player-presets-actions { margin-top: 12px; display: flex; justify-content: flex-end; }
  .player-icon { width: 18px; height: 18px; }

  /* fake item-controls cluster (vote / fav / playlist) */
  .zx-item-controls { display: inline-flex; align-items: center; gap: 2px; }
  .zx-item-controls .vote { font-size: 11px; color: var(--text-light-color); font-family: var(--font-mono); margin: 0 4px 0 2px; }

  /* compact stop button — sits between play & next */
  .player-stop svg { width: 16px; height: 16px; }
</style>
</head>
<body>

  <div class="player-wrap">
    <div class="label">player bar — compact (default)</div>
    <div class="zx-player">
      <!-- left: transport -->
      <div class="zx-player__controls" style="gap: 4px;">
        <button class="zx-button zx-button--sm zx-button--transparent zx-button--round" aria-label="Previous">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="zx-button zx-button--sm zx-button--secondary zx-button--round" aria-label="Pause">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
        </button>
        <button class="zx-button zx-button--sm zx-button--transparent zx-button--round" aria-label="Stop">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><rect x="6" y="6" width="12" height="12"/></svg>
        </button>
        <button class="zx-button zx-button--sm zx-button--transparent zx-button--round" aria-label="Next">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z"/></svg>
        </button>
        <button class="zx-button zx-button--sm zx-button--transparent zx-button--round" aria-label="Repeat one">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2zm-5-1v-4h-1l-2 1v1h1.5v3z"/></svg>
        </button>
        <button class="zx-button zx-button--sm zx-button--transparent zx-button--round" aria-label="Open original">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19 19H5V5h7V3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2v-7h-2zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3z"/></svg>
        </button>
      </div>

      <!-- middle: progress with title overlay -->
      <div class="zx-player__progress">
        <div class="zx-player__fill" style="width:42%;"></div>
        <span class="zx-player__title">"Robocop" — Tim Follin · AY · 2:14</span>
      </div>

      <!-- right: meta cluster -->
      <span class="zx-item-controls">
        <button class="zx-button zx-button--sm zx-button--transparent zx-button--round" aria-label="Vote">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="var(--icon-yellow)"><path d="M12 2l3.09 6.26 6.91 1-5 4.87L18.18 22 12 18.27 5.82 22l1.18-7.87-5-4.87 6.91-1z"/></svg>
        </button>
        <span class="vote">4.7 · 73</span>
        <button class="zx-button zx-button--sm zx-button--transparent zx-button--round" aria-label="Favourite">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </button>
        <button class="zx-button zx-button--sm zx-button--transparent zx-button--round" aria-label="Add to playlist">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M14 10H3v2h11zm0-4H3v2h11zM3 16h7v-2H3zm12-2v6l5-3z"/></svg>
        </button>
      </span>

      <button class="zx-button zx-button--sm zx-button--transparent zx-button--round" aria-label="Expand filters">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
      </button>
      <button class="zx-button zx-button--sm zx-button--transparent zx-button--round" aria-label="Close">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
  </div>

  <div class="player-wrap">
    <div class="label">player bar — expanded (radio criteria)</div>
    <div class="zx-player" style="border-radius: var(--radius-lg) var(--radius-lg) 0 0; box-shadow: none;">
      <div class="zx-player__controls" style="gap: 4px;">
        <button class="zx-button zx-button--sm zx-button--transparent zx-button--round" aria-label="Previous"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <button class="zx-button zx-button--sm zx-button--secondary  zx-button--round" aria-label="Play"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
        <button class="zx-button zx-button--sm zx-button--transparent zx-button--round" aria-label="Stop"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><rect x="6" y="6" width="12" height="12"/></svg></button>
        <button class="zx-button zx-button--sm zx-button--transparent zx-button--round" aria-label="Next"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z"/></svg></button>
        <button class="zx-button zx-button--sm zx-button--transparent zx-button--round" aria-label="Mode"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5z"/></svg></button>
      </div>
      <div class="zx-player__progress">
        <div class="zx-player__fill" style="width: 0;"></div>
        <span class="zx-player__title">📻 Radio — any tune matching filters</span>
      </div>
      <button class="zx-button zx-button--sm zx-button--transparent zx-button--round" aria-label="Collapse">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M16.59 15.41L12 10.83l-4.59 4.58L6 14l6-6 6 6z"/></svg>
      </button>
    </div>

    <div class="player-advanced">
      <div class="player-presets">
        <button class="zx-button zx-button--sm zx-button--outlined" style="background: var(--secondary-200); border-color: var(--secondary-500);">All time top</button>
        <button class="zx-button zx-button--sm zx-button--outlined">Recent</button>
        <button class="zx-button zx-button--sm zx-button--outlined">Compo winners</button>
        <button class="zx-button zx-button--sm zx-button--outlined">AY only</button>
        <button class="zx-button zx-button--sm zx-button--outlined">Beeper only</button>
      </div>
      <div class="player-advanced-grid">
        <div class="player-field">
          <span class="player-field-label">Min rating</span>
          <input class="zx-input zx-input--sm" value="4.0" />
        </div>
        <div class="player-field">
          <span class="player-field-label">Category</span>
          <input class="zx-input zx-input--sm" value="any" />
        </div>
        <div class="player-field">
          <span class="player-field-label">Min party place</span>
          <input class="zx-input zx-input--sm" value="3" />
        </div>
        <div class="player-field">
          <span class="player-field-label">Year from / to</span>
          <input class="zx-input zx-input--sm" value="1985 — 2024" />
        </div>
        <div class="player-field">
          <span class="player-field-label">Countries</span>
          <input class="zx-input zx-input--sm" placeholder="any" />
        </div>
        <div class="player-field">
          <span class="player-field-label">Sound groups</span>
          <input class="zx-input zx-input--sm" placeholder="any" />
        </div>
        <div class="player-field">
          <span class="player-field-label">Formats</span>
          <input class="zx-input zx-input--sm" value=".pt3, .stc" />
        </div>
        <div class="player-field">
          <span class="player-field-label">Party</span>
          <input class="zx-input zx-input--sm" placeholder="any" />
        </div>
        <div class="player-field" style="grid-column: 1 / -1;">
          <label class="zx-checkbox"><input type="checkbox" /> Unvoted only</label>
        </div>
      </div>
      <div class="player-presets-actions">
        <button class="zx-button zx-button--sm zx-button--outlined">Clear all</button>
      </div>
    </div>
  </div>

</body>
</html>
