<!doctype html>
<html lang="en" class="light-mode">
<head>
<meta charset="utf-8" />
<title>zx-item-data</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="components.css" />
<style>
  body { margin: 0; padding: 16px; font-family: var(--font-sans); color: var(--text-color); background: var(--background-page); }
  .card {
    background: var(--surface);
    border: 1px solid var(--secondary-200);
    border-radius: var(--radius-md);
    padding: 16px;
    max-width: 420px;
  }
  h3 { margin: 0 0 12px; font-size: var(--font-md); font-weight: 700; }
</style>
</head>
<body>
  <div class="card">
    <h3>Crystal Kingdom Dizzy</h3>
    <dl class="zx-item-data">
      <dt class="zx-item-data-item__label">Год</dt>
      <dd class="zx-item-data-item__value">1992</dd>
      <dt class="zx-item-data-item__label">Авторы</dt>
      <dd class="zx-item-data-item__value">Dave Thompson, Jarrod Bentley</dd>
      <dt class="zx-item-data-item__label">Музыка</dt>
      <dd class="zx-item-data-item__value">Reflective Designs</dd>
      <dt class="zx-item-data-item__label">Издатель</dt>
      <dd class="zx-item-data-item__value"><a href="#">Code Masters Ltd</a></dd>
      <dt class="zx-item-data-item__label">Серия</dt>
      <dd class="zx-item-data-item__value"><a href="#">Dizzy</a></dd>
      <dt class="zx-item-data-item__label">Добавлена</dt>
      <dd class="zx-item-data-item__value" style="font-family: var(--font-mono); color: var(--text-light-color);">18.11.2016</dd>
    </dl>
  </div>
</body>
</html>
