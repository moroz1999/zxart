<!doctype html>
<html lang="ru" class="light-mode">
<head>
<meta charset="utf-8" />
<title>Author page — ZXArt</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="../../preview/components.css" />
<link rel="stylesheet" href="kit.css" />
<link rel="stylesheet" href="release-page.css" />
<link rel="stylesheet" href="author-page.css" />
<style>
  body { margin: 0; background: var(--background-deep); font-family: var(--font-sans); }
  .ap-other-files {
    background: var(--surface);
    border: 1px solid var(--secondary-200);
    border-radius: var(--radius-md);
    padding: 10px 14px;
    margin: 0 0 8px 0;
    font-size: var(--font-xs);
    color: var(--text-light-color);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: baseline;
  }
  .ap-other-files b { color: var(--text-color); font-weight: 700; margin-right: 4px; }
  .ap-other-files a { color: var(--link-color); text-decoration: none; font-weight: 700; }
  .ap-other-files a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="PictureCard.jsx"></script>
<script type="text/babel" src="ProdCard.jsx"></script>
<script type="text/babel" src="author-data.jsx"></script>
<script type="text/babel" src="AuthorPage.jsx"></script>
<script type="text/babel" src="AuthorPageWorks.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "preset": "moroz"
}/*EDITMODE-END*/;

function ControlsPanel() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection title="Theme">
        <TweakRadio label="Mode" value={t.theme} options={[{value:"light",label:"Light"},{value:"dark",label:"Dark"}]} onChange={v=>setTweak("theme",v)}/>
      </TweakSection>
      <TweakSection title="Author preset">
        <TweakSelect label="Type" value={t.preset} options={[
          {value:"moroz",  label:"All-rounder (Moroz1999)"},
          {value:"newbie", label:"Newbie (2 works)"},
        ]} onChange={v=>setTweak("preset",v)}/>
      </TweakSection>
    </TweaksPanel>
  );
}

function LiveAuthorPage() {
  const [t] = useTweaks(TWEAK_DEFAULTS);
  return (
    <div className={t.theme === "dark" ? "dark-mode" : "light-mode"} style={{ background: "var(--background-page)" }}>
      <div className="ap-other-files">
        <b>Соседние шаблоны:</b>
        <span>статичные сравнения тем разнесены — каждое полотно открывается быстро.</span>
        <a href="author-page-states.html">→ Light + Dark side-by-side</a>
        <a href="author-page-newbie.html">→ Минимальный кейс</a>
      </div>
      <AuthorPage preset={t.preset}/>
    </div>
  );
}

function App() {
  return (
    <>
      <DesignCanvas
        title="Author page — moroz1999"
        subtitle="Живое полотно: переключайте тему и пресет через Tweaks. Подробные списки работ — во вкладках под дашбордом."
      >
        <DCSection id="live" title="Live · переключайте Tweaks">
          <DCArtboard id="live" label="Все интерактивные части — пагинация, фильтры, табы" width={1240} height={3600}>
            <LiveAuthorPage/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
      <ControlsPanel/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
