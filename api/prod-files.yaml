openapi: 3.0.0
paths:
  /prod-screenshots/:
    get:
      summary: Screenshots gallery for a zxProd (connectedFile selector)
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Files payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProdFilesPayload'
        '400':
          description: Bad request
        '404':
          description: Prod not found
        '500':
          description: Internal server error

  /prod-inlays/:
    get:
      summary: Inlay images from all releases of a zxProd, each with release metadata
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Release inlays payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProdReleaseInlaysPayload'
        '400':
          description: Bad request
        '404':
          description: Prod not found
        '500':
          description: Internal server error

  /prod-instructions/:
    get:
      summary: Instruction files from all releases of a zxProd, each with release metadata
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Release instructions payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProdReleaseInstructionsPayload'
        '400':
          description: Bad request
        '404':
          description: Prod not found
        '500':
          description: Internal server error

  /prod-maps/:
    get:
      summary: Map images for a zxProd (mapFilesSelector + speccyMaps URL)
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Maps payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProdMapsPayload'
        '400':
          description: Bad request
        '404':
          description: Prod not found
        '500':
          description: Internal server error

  /prod-rzx/:
    get:
      summary: RZX files for a zxProd
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Files payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProdFilesPayload'
        '400':
          description: Bad request
        '404':
          description: Prod not found
        '500':
          description: Internal server error

  /prod-screenshot-move/:
    post:
      summary: Move a prod or release screenshot left or right (requires publicReceive privilege)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - id
                - fileId
                - direction
              properties:
                id:
                  type: integer
                  description: Prod or release element ID
                fileId:
                  type: integer
                  description: File element ID to move
                direction:
                  type: string
                  enum: [left, right]
      responses:
        '200':
          description: Updated files payload after reorder
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProdFilesPayload'
        '400':
          description: Bad request (missing or invalid params)
        '403':
          description: Access denied
        '404':
          description: Element or file not found
        '500':
          description: Internal server error

  /release-screenshots/:
    get:
      summary: Per-release screenshots gallery (screenshotsSelector on zxRelease)
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Files payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProdFilesPayload'
        '400':
          description: Bad request
        '404':
          description: Release not found
        '500':
          description: Internal server error

components:
  schemas:
    ProdFile:
      type: object
      required:
        - id
        - title
        - author
        - fileName
        - imageUrl
        - fullImageUrl
        - downloadUrl
        - isImage
      properties:
        id:
          type: integer
        title:
          type: string
        author:
          type: string
          nullable: true
        fileName:
          type: string
        imageUrl:
          type: string
          nullable: true
        fullImageUrl:
          type: string
          nullable: true
        downloadUrl:
          type: string
        isImage:
          type: boolean

    ProdFilesPayload:
      type: object
      required:
        - files
      properties:
        files:
          type: array
          items:
            $ref: '#/components/schemas/ProdFile'

    ProdGroupRef:
      type: object
      required:
        - id
        - title
        - url
      properties:
        id:
          type: integer
        title:
          type: string
        url:
          type: string

    ProdReleaseInlay:
      type: object
      required:
        - id
        - title
        - author
        - fileName
        - imageUrl
        - fullImageUrl
        - downloadUrl
        - isImage
        - releaseId
        - releaseTitle
        - releaseUrl
        - releaseYear
        - releaseTypeLabel
        - releaseBy
      properties:
        id:
          type: integer
        title:
          type: string
        author:
          type: string
          nullable: true
        fileName:
          type: string
        imageUrl:
          type: string
          nullable: true
        fullImageUrl:
          type: string
          nullable: true
        downloadUrl:
          type: string
        isImage:
          type: boolean
        releaseId:
          type: integer
        releaseTitle:
          type: string
        releaseUrl:
          type: string
        releaseYear:
          type: integer
        releaseTypeLabel:
          type: string
          nullable: true
        releaseBy:
          type: array
          items:
            $ref: '#/components/schemas/ProdGroupRef'

    ProdReleaseInlaysPayload:
      type: object
      required:
        - inlays
      properties:
        inlays:
          type: array
          items:
            $ref: '#/components/schemas/ProdReleaseInlay'

    ProdReleaseInstructionFile:
      type: object
      required:
        - id
        - title
        - fileName
        - downloadUrl
        - releaseTitle
        - releaseUrl
        - releaseYear
        - releaseTypeLabel
        - releaseBy
      properties:
        id:
          type: integer
        title:
          type: string
        fileName:
          type: string
        downloadUrl:
          type: string
        releaseTitle:
          type: string
        releaseUrl:
          type: string
        releaseYear:
          type: integer
        releaseTypeLabel:
          type: string
          nullable: true
        releaseBy:
          type: array
          items:
            $ref: '#/components/schemas/ProdGroupRef'

    ProdReleaseInstructionsPayload:
      type: object
      required:
        - files
      properties:
        files:
          type: array
          items:
            $ref: '#/components/schemas/ProdReleaseInstructionFile'

    ProdMapsPayload:
      type: object
      required:
        - files
        - mapsUrl
      properties:
        files:
          type: array
          items:
            $ref: '#/components/schemas/ProdFile'
        mapsUrl:
          type: string
          nullable: true
