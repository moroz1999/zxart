openapi: 3.0.0
paths:
  /prod-compilation-items/:
    get:
      summary: Prods included in this compilation (compilationItems)
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Prod summaries payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProdSummariesPayload'
        '400':
          description: Bad request
        '404':
          description: Prod not found
        '500':
          description: Internal server error

  /prod-series-prods/:
    get:
      summary: Sibling prods of this series (seriesProds)
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Prod summaries payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProdSummariesPayload'
        '400':
          description: Bad request
        '404':
          description: Prod not found
        '500':
          description: Internal server error

  /prod-compilations/:
    get:
      summary: Compilations that include this prod
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Prod summaries payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProdSummariesPayload'
        '400':
          description: Bad request
        '404':
          description: Prod not found
        '500':
          description: Internal server error

  /prod-series/:
    get:
      summary: Prods from the same series as this prod
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Prod summaries payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProdSummariesPayload'
        '400':
          description: Bad request
        '404':
          description: Prod not found
        '500':
          description: Internal server error

components:
  schemas:
    ProdSummary:
      type: object
      required:
        - id
        - title
        - url
        - year
        - legalStatus
        - legalStatusLabel
        - votes
        - votesAmount
        - imageUrl
      properties:
        id:
          type: integer
        title:
          type: string
        url:
          type: string
        year:
          type: integer
        legalStatus:
          type: string
        legalStatusLabel:
          type: string
        votes:
          type: number
          format: float
        votesAmount:
          type: integer
        imageUrl:
          type: string
          nullable: true

    ProdSummariesPayload:
      type: object
      required:
        - prods
      properties:
        prods:
          type: array
          items:
            $ref: '#/components/schemas/ProdSummary'
