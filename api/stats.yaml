paths:
  /stats/:
    get:
      summary: Statistics overview, per-category blocks and top users
      parameters:
        - in: query
          name: action
          schema:
            type: string
            enum:
              - overview
              - soft
              - music
              - gfx
              - users
              - soft-summary
              - music-summary
              - gfx-summary
              - soft-series
              - music-series
              - gfx-series
              - soft-distributions
              - soft-category-distribution
              - soft-computer-distribution
              - soft-country-distribution
              - music-distributions
              - music-format-distribution
              - music-country-distribution
              - gfx-distributions
              - gfx-type-distribution
              - gfx-country-distribution
              - soft-daily
              - music-daily
              - gfx-daily
              - soft-top
              - music-top
              - gfx-top
              - users-voters
              - users-comments
              - users-tags
            default: overview
      responses:
        '200':
          description: Statistics payload for the requested action
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/StatsOverview'
                  - $ref: '#/components/schemas/StatsCategorySection'
                  - $ref: '#/components/schemas/StatsUsersSection'
                  - $ref: '#/components/schemas/StatsCategorySummary'
                  - $ref: '#/components/schemas/StatsYearSeries'
                  - $ref: '#/components/schemas/StatsDistributionsSection'
                  - $ref: '#/components/schemas/StatsDistributionBlock'
                  - $ref: '#/components/schemas/StatsDailySeries'
                  - $ref: '#/components/schemas/StatsTopUsersSection'
        '400':
          description: Invalid action
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorPayload'

components:
  schemas:
    StatsOverview:
      type: object
      required: [prods, releases, authors, authorsWithAliases, groups, groupsWithAliases, music, pictures]
      properties:
        prods:
          type: integer
        releases:
          type: integer
        authors:
          type: integer
        authorsWithAliases:
          type: integer
        groups:
          type: integer
        groupsWithAliases:
          type: integer
        music:
          type: integer
        pictures:
          type: integer
    StatsYearSeries:
      type: object
      required: [years, all, rated]
      properties:
        years:
          type: array
          items:
            type: integer
        all:
          type: array
          items:
            type: integer
        rated:
          type: array
          items:
            type: integer
    StatsCategorySummary:
      type: object
      required: [totalWorks, peakYear, dailyTotal]
      properties:
        totalWorks:
          type: integer
        peakYear:
          type: integer
        dailyTotal:
          type: integer
    StatsDistribution:
      type: object
      required: [titleKey, classes, rows]
      properties:
        titleKey:
          type: string
        classes:
          type: array
          items:
            type: string
        rows:
          type: array
          description: One row per year; each row holds the count per class in the same order as classes.
          items:
            type: array
            items:
              type: integer
    StatsDailySeries:
      type: object
      required: [labelKey, dates, data]
      properties:
        labelKey:
          type: string
        dates:
          type: array
          items:
            type: string
        data:
          type: array
          items:
            type: integer
    StatsDistributionsSection:
      type: object
      required: [years, distributions]
      properties:
        years:
          type: array
          items:
            type: integer
        distributions:
          type: array
          items:
            $ref: '#/components/schemas/StatsDistribution'
    StatsDistributionBlock:
      type: object
      required: [years, distribution]
      properties:
        years:
          type: array
          items:
            type: integer
        distribution:
          $ref: '#/components/schemas/StatsDistribution'
    StatsTopUser:
      type: object
      required: [name, url, badges, count]
      properties:
        name:
          type: string
        url:
          type: string
          nullable: true
        badges:
          type: array
          items:
            type: string
            enum: [vip, volunteer, supporter]
        count:
          type: integer
    StatsCategorySection:
      type: object
      required: [totalWorks, peakYear, dailyTotal, topUnitKey, series, distributions, daily, top]
      properties:
        totalWorks:
          type: integer
        peakYear:
          type: integer
        dailyTotal:
          type: integer
        topUnitKey:
          type: string
        series:
          $ref: '#/components/schemas/StatsYearSeries'
        distributions:
          type: array
          items:
            $ref: '#/components/schemas/StatsDistribution'
        daily:
          $ref: '#/components/schemas/StatsDailySeries'
        top:
          type: array
          items:
            $ref: '#/components/schemas/StatsTopUser'
    StatsUsersSection:
      type: object
      required: [voters, comments, tags]
      properties:
        voters:
          type: array
          items:
            $ref: '#/components/schemas/StatsTopUser'
        comments:
          type: array
          items:
            $ref: '#/components/schemas/StatsTopUser'
        tags:
          type: array
          items:
            $ref: '#/components/schemas/StatsTopUser'
    StatsTopUsersSection:
      type: object
      required: [unitKey, users]
      properties:
        unitKey:
          type: string
        users:
          type: array
          items:
            $ref: '#/components/schemas/StatsTopUser'
    ErrorPayload:
      type: object
      required: [errorMessage]
      properties:
        errorMessage:
          type: string
