openapi: 3.0.0
paths:
  /author-details/:
    get:
      summary: Get core profile data for an author or author alias details page
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Full payload for the author details page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorCorePayload'
        '400':
          description: Bad request
        '404':
          description: Author or author alias not found
        '500':
          description: Internal server error
  /author-prods/:
    get:
      summary: Get paged productions for an author or author alias details page
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: start
          schema:
            type: integer
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: sort
          schema:
            type: string
            enum: [year, votes]
        - in: query
          name: sortDir
          schema:
            type: string
            enum: [asc, desc]
        - in: query
          name: role
          description: Role key used to filter items; `availableRoles` remains unfiltered.
          schema:
            type: string
      responses:
        '200':
          description: Paged productions and available author roles for filtering
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorProdsPage'
        '400':
          description: Bad request
        '404':
          description: Author or author alias not found
        '500':
          description: Internal server error
  /author-collaborators/:
    get:
      summary: Get collaborators for an author or author alias details page
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Collaborating people and groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorCollaborators'
        '400':
          description: Bad request
        '404':
          description: Author or author alias not found
        '500':
          description: Internal server error

components:
  schemas:
    AuthorLocationItem:
      type: object
      required:
        - title
        - url
      properties:
        title:
          type: string
        url:
          type: string

    AuthorLocation:
      type: object
      required:
        - city
        - country
      properties:
        city:
          allOf:
            - $ref: '#/components/schemas/AuthorLocationItem'
          nullable: true
        country:
          allOf:
            - $ref: '#/components/schemas/AuthorLocationItem'
          nullable: true

    AuthorGroup:
      type: object
      required:
        - id
        - title
        - url
        - years
      properties:
        id:
          type: integer
        title:
          type: string
        url:
          type: string
        years:
          type: string
          nullable: true

    AuthorAliasRef:
      type: object
      required:
        - id
        - title
        - url
      properties:
        id:
          type: integer
        title:
          type: string
        url:
          type: string

    AuthorLink:
      type: object
      required:
        - url
        - label
      properties:
        url:
          type: string
        label:
          type: string

    AuthorTech:
      type: object
      required:
        - palette
        - ayChip
        - ayChannels
        - ayClock
        - intFreq
      properties:
        palette:
          type: string
        ayChip:
          type: string
        ayChannels:
          type: string
        ayClock:
          type: string
        intFreq:
          type: string

    AuthorCounters:
      type: object
      required:
        - pictures
        - tunes
        - prods
        - comments
      properties:
        pictures:
          type: integer
        tunes:
          type: integer
        prods:
          type: integer
        comments:
          type: integer

    AuthorRatings:
      type: object
      required:
        - artist
        - musician
      properties:
        artist:
          type: number
          format: float
        musician:
          type: number
          format: float

    AuthorTabs:
      type: object
      required:
        - hasPictures
        - hasTunes
        - hasProds
      properties:
        hasPictures:
          type: boolean
        hasTunes:
          type: boolean
        hasProds:
          type: boolean

    AuthorBreadcrumb:
      type: object
      required:
        - title
        - url
      properties:
        title:
          type: string
        url:
          type: string

    AuthorCorePayload:
      type: object
      required:
        - id
        - entityType
        - title
        - realName
        - url
        - parentUrl
        - parentTitle
        - primaryAuthor
        - siteUser
        - joined
        - roles
        - badges
        - location
        - groups
        - aliases
        - links
        - tech
        - counters
        - ratings
        - tabs
        - breadcrumbs
      properties:
        id:
          type: integer
        entityType:
          type: string
          enum: [author, authorAlias]
        title:
          type: string
        realName:
          type: string
        url:
          type: string
        parentUrl:
          type: string
          nullable: true
        parentTitle:
          type: string
          nullable: true
        primaryAuthor:
          allOf:
            - $ref: '#/components/schemas/AuthorAliasRef'
          nullable: true
        siteUser:
          type: string
          nullable: true
        joined:
          type: string
          nullable: true
          description: ISO date (YYYY-MM-DD) of account registration
        roles:
          type: array
          items:
            type: string
            enum: [artist, musician, coder]
        badges:
          type: array
          items:
            type: string
            enum: [VIP, Volunteer]
        location:
          $ref: '#/components/schemas/AuthorLocation'
        groups:
          type: array
          items:
            $ref: '#/components/schemas/AuthorGroup'
        aliases:
          type: array
          items:
            $ref: '#/components/schemas/AuthorAliasRef'
        links:
          type: array
          items:
            $ref: '#/components/schemas/AuthorLink'
        tech:
          $ref: '#/components/schemas/AuthorTech'
        counters:
          $ref: '#/components/schemas/AuthorCounters'
        ratings:
          $ref: '#/components/schemas/AuthorRatings'
        tabs:
          $ref: '#/components/schemas/AuthorTabs'
        breadcrumbs:
          type: array
          items:
            $ref: '#/components/schemas/AuthorBreadcrumb'

    AuthorshipRef:
      type: object
      required:
        - title
        - url
        - roles
      properties:
        title:
          type: string
        url:
          type: string
        roles:
          type: array
          items:
            type: string

    ConnectedElement:
      type: object
      required:
        - id
        - title
        - url
      properties:
        id:
          type: integer
        title:
          type: string
        url:
          type: string
          nullable: true

    ConnectedItem:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: string
        title:
          type: string

    ProdItem:
      type: object
      required:
        - id
        - url
        - structureType
        - dateCreated
        - title
        - votes
        - votesAmount
        - userVote
        - denyVoting
        - hardwareInfo
        - authorsInfoShort
        - categoriesInfo
        - partyPlace
        - languagesInfo
        - groupsInfo
      properties:
        id:
          type: integer
        url:
          type: string
        structureType:
          type: string
          enum: [zxProd, zxRelease]
        dateCreated:
          type: integer
        title:
          type: string
        year:
          type: integer
          nullable: true
        listImagesUrls:
          type: array
          items:
            type: string
        votes:
          type: number
          format: float
        votesAmount:
          type: integer
        userVote:
          type: integer
          nullable: true
        denyVoting:
          type: boolean
        hardwareInfo:
          type: array
          items:
            $ref: '#/components/schemas/ConnectedItem'
        authorsInfoShort:
          type: array
          items:
            $ref: '#/components/schemas/AuthorshipRef'
        categoriesInfo:
          type: array
          items:
            $ref: '#/components/schemas/ConnectedElement'
        partyInfo:
          allOf:
            - $ref: '#/components/schemas/ConnectedElement'
          nullable: true
        partyPlace:
          type: integer
        legalStatus:
          type: string
          nullable: true
        languagesInfo:
          type: array
          items:
            $ref: '#/components/schemas/ConnectedItem'
        groupsInfo:
          type: array
          items:
            $ref: '#/components/schemas/ConnectedElement'
        youtubeId:
          type: string
          nullable: true
        releaseType:
          type: string
          nullable: true

    AuthorProdItem:
      allOf:
        - $ref: '#/components/schemas/ProdItem'
        - type: object
          required:
            - rolesInProd
          properties:
            rolesInProd:
              type: array
              items:
                type: string

    AuthorProdsPage:
      type: object
      required:
        - items
        - total
        - availableRoles
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuthorProdItem'
        total:
          type: integer
        availableRoles:
          type: array
          description: Distinct roles from all matching productions, independent of the selected role filter.
          items:
            type: string

    AuthorCollaboratorPerson:
      type: object
      required: [id, title, url, jointPictures, jointTunes, jointProds, jointTotal]
      properties:
        id:
          type: integer
        title:
          type: string
        url:
          type: string
        jointPictures:
          type: integer
          description: Number of shared pictures linked to both authors.
        jointTunes:
          type: integer
          description: Number of shared tunes linked to both authors.
        jointProds:
          type: integer
          description: Number of shared productions and releases authored by both authors.
        jointTotal:
          type: integer
          description: Total number of shared pictures, tunes, productions, and releases.

    AuthorCollaboratorGroup:
      type: object
      required: [id, title, url, years, membersCount, jointProds]
      properties:
        id:
          type: integer
        title:
          type: string
        url:
          type: string
        years:
          type: string
          nullable: true
        membersCount:
          type: integer
        jointProds:
          type: integer

    AuthorCollaborators:
      type: object
      required: [people, groups]
      properties:
        people:
          type: array
          items:
            $ref: '#/components/schemas/AuthorCollaboratorPerson'
        groups:
          type: array
          items:
            $ref: '#/components/schemas/AuthorCollaboratorGroup'
