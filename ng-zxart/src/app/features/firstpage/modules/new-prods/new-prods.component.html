<ng-container *ngIf="vm$ | async as vm">
  <zx-firstpage-module-wrapper
    titleKey="firstpage.modules.newProds"
    [viewAllUrl]="vm.viewAllUrl"
    [viewAllLabelKey]="vm.viewAllLabelKey"
    [usePanel]="false"
    [loading]="vm.loading"
    [error]="vm.error"
    [empty]="vm.empty"
    skeletonVariant="prod-grid"
    [skeletonCount]="settings.limit"
  >
    <div class="prods-grid">
      <zx-prod-block *ngFor="let prod of vm.items" [model]="prod"></zx-prod-block>
    </div>
  </zx-firstpage-module-wrapper>
</ng-container>
