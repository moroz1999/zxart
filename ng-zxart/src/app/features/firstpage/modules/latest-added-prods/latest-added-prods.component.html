<ng-container *ngIf="vm$ | async as vm">
  <zx-firstpage-module-wrapper
    titleKey="firstpage.modules.latestAddedProds"
    [viewAllUrl]="vm.viewAllUrl"
    [viewAllLabelKey]="vm.viewAllLabelKey"
    [usePanel]="false"
    [loading]="false"
    [error]="vm.error"
    [empty]="!vm.loading && vm.empty"
  >
    <zx-prods-list-view [items$]="items$" [skeletonCount]="settings.limit"></zx-prods-list-view>
  </zx-firstpage-module-wrapper>
</ng-container>
