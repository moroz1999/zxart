@if (!hasLoaded()) {
  <zx-panel [appInViewport]="!loading()" (inViewport)="onInViewport()">
    <zx-row-skeleton [count]="5"></zx-row-skeleton>
  </zx-panel>
} @else if (hasLoaded() && totalCount() > 0) {
  <zx-panel [title]="'author.votes-on-works' | translate">
    <zx-table
      size="sm"
      class="author-ratings__results"
      [class.author-ratings__results--loading]="loading()">
      <table>
        <tbody>
          @for (item of items(); track $index) {
            <tr>
              <td><zx-user [user]="item.user"></zx-user></td>
              <td class="rating-value">{{ item.rating }}</td>
              <td><a [href]="item.targetUrl" appText="body" tone="link">{{ item.targetTitle }}</a></td>
            </tr>
          }
        </tbody>
      </table>
    </zx-table>
    @if (pagesAmount() > 1) {
      <zx-pagination
        [currentPage]="currentPage()"
        [pagesAmount]="pagesAmount()"
        [loading]="loading()"
        (pageChange)="onPageChange($event)">
      </zx-pagination>
    }
  </zx-panel>
}
