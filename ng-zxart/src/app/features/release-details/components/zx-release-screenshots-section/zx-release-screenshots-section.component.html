<section>
  <zx-inline class="rp-section-head" align="baseline" spacing="sm">
    <h2 appHeading="headline">Скрины релиза</h2>
    <span appText="bodySm" tone="muted">{{ screenshots.length }}</span>
  </zx-inline>

  <zx-picture-gallery-host></zx-picture-gallery-host>

  <div class="rp-tile-grid rp-tile-grid--screens">
    <figure
      *ngFor="let file of screenshots; let i = index; trackBy: trackById"
      class="rp-tile"
    >
      <div class="rp-tile__img">
        <img
          *ngIf="file.imageUrl"
          loading="lazy"
          [src]="file.imageUrl"
          [alt]="file.title"
          [lightbox]="i"
          [gallery]="galleryId"
        />
      </div>
      <figcaption class="rp-tile__meta">
        <span class="rp-tile__label" appText="caption">{{ file.title || file.fileName }}</span>
      </figcaption>
    </figure>
  </div>
</section>
