<section>
  <zx-release-section-head
    titleKey="release-details.screenshots"
    [count]="files.length">
  </zx-release-section-head>

  <zx-picture-gallery-host></zx-picture-gallery-host>

  <div class="release-screenshots-section__grid">
    <figure
      *ngFor="let file of files; let i = index; trackBy: trackById"
      class="release-screenshots-section__item"
    >
      <div class="release-screenshots-section__thumb-wrap">
        <img
          *ngIf="file.imageUrl"
          class="release-screenshots-section__thumb"
          loading="lazy"
          [src]="file.imageUrl"
          [alt]="file.title"
          [lightbox]="i"
          [gallery]="galleryId"
        />
        <div class="release-screenshots-section__controls">
          <ng-container *ngIf="canReorder">
            <zx-button
              size="xs"
              color="secondary"
              [disabled]="moving || isFirst(file)"
              (click)="onMove(file, 'left')"
              [attr.aria-label]="'prod-details.screenshot-move-left' | translate"
            ><svg-icon name="skip-previous" class="release-screenshots-section__btn-icon"></svg-icon></zx-button>
            <zx-button
              size="xs"
              color="secondary"
              [disabled]="moving || isLast(file)"
              (click)="onMove(file, 'right')"
              [attr.aria-label]="'prod-details.screenshot-move-right' | translate"
            ><svg-icon name="skip-next" class="release-screenshots-section__btn-icon"></svg-icon></zx-button>
          </ng-container>
          <zx-button
            size="xs"
            color="secondary"
            [href]="file.downloadUrl"
            [attr.aria-label]="'prod-details.screenshot-download' | translate"
          ><svg-icon name="download" class="release-screenshots-section__btn-icon"></svg-icon></zx-button>
        </div>
      </div>
    </figure>
  </div>
</section>
