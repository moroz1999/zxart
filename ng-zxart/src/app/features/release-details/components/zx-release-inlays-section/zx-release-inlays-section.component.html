<section>
  <zx-release-section-head
    titleKey="release-details.inlays"
    [count]="inlays.length">
  </zx-release-section-head>

  <zx-grid columns="5" gap="xs">
    <zx-inlay-tile
      *ngFor="let inlay of inlays; trackBy: trackById"
      [inlay]="inlay"
      (imageClick)="openDownload(inlay.downloadUrl)"
    ></zx-inlay-tile>
  </zx-grid>
</section>
