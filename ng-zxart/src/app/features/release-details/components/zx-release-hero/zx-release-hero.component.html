<zx-stack spacing="md">
  <zx-inline class="rp-title-row" align="baseline" spacing="sm" [wrap]="true">
    <h1 appHeading="display">{{ details.title }}</h1>
    <zx-release-editing-controls
      [elementId]="details.id"
      [releaseUrl]="details.url">
    </zx-release-editing-controls>
    <span *ngIf="details.year" class="rp-year" appText="body" tone="muted">{{ details.year }}</span>
    <zx-release-type-badge
      *ngIf="details.releaseType"
      [type]="details.releaseType"
      [label]="details.releaseTypeLabel">
    </zx-release-type-badge>
  </zx-inline>

  <zx-prod-people-row
    [authors]="details.authors"
    [publishers]="details.publishers"
    [party]="details.party">
  </zx-prod-people-row>

  <zx-inline *ngIf="details.formats.length" align="center" spacing="xs" [wrap]="true" appText="label" tone="muted">
    <ng-container *ngFor="let fmt of details.formats; let last = last">
      <zx-inline class="rp-format" align="center" spacing="xs">
        <span *ngIf="fmt.emoji">{{ fmt.emoji }}</span>
        <span>{{ fmt.label }}</span>
      </zx-inline><ng-container *ngIf="!last">, </ng-container>
    </ng-container>
  </zx-inline>

  <zx-inline *ngIf="details.hardware.length" align="center" spacing="xs" [wrap]="true">
    <span appText="bodySm" tone="strong" class="rp-hw-label">{{ 'release-details.hardware-label' | translate }}</span>
    <zx-button
      *ngFor="let hw of details.hardware"
      color="outlined"
      size="xs"
      [href]="hw.catalogueUrl"
    ><zx-hardware-icon [id]="hw.id"></zx-hardware-icon>{{ 'hardware.' + hw.id | translate }}</zx-button>
  </zx-inline>

  <zx-rating-strip
    *ngIf="details.votes.votes > 0"
    [label]="'zx-rating-strip.label' | translate"
    [items]="[{type: 'overall', value: details.votes.votes}]"
    [showTypeLabel]="false">
  </zx-rating-strip>

  <zx-added-by
    *ngIf="details.dateCreated"
    [dateAdded]="details.dateCreated"
    [submitter]="details.submitter"
  ></zx-added-by>
</zx-stack>
