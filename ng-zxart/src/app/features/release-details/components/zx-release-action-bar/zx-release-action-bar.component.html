<zx-inline align="center" spacing="md" [wrap]="true">
  <zx-inline align="baseline" spacing="xs" class="rp-rating">
    <ng-container *ngIf="details.votes.votesAmount > 0; else noVotes">
      <span class="rp-rating__score" appHeading="title">{{ details.votes.votes | number:'1.1-1' }}</span>
      <span appText="bodySm" tone="muted">/ 5 · {{ details.votes.votesAmount }} голосов</span>
    </ng-container>
    <ng-template #noVotes>
      <span appText="bodySm" tone="muted">Голосов пока нет.</span>
    </ng-template>
  </zx-inline>

  <zx-inline align="center" spacing="md" [wrap]="true" appText="caption" tone="muted">
    <span><b>{{ details.downloadsCount }}</b> скачиваний</span>
    <span><b>{{ details.playsCount }}</b> запусков</span>
  </zx-inline>

  <zx-button-controls align="end" class="rp-actions">
    <zx-emulator-play-button
      [isPlayable]="details.isPlayable"
      [isDownloadable]="details.isDownloadable"
      [playUrl]="details.playUrl"
      [emulatorType]="details.emulatorType"
    >▶ Запустить</zx-emulator-play-button>

    <zx-button
      *ngIf="details.isDownloadable && details.downloadUrl"
      color="outlined"
      [href]="details.downloadUrl"
      target="_blank"
    >↓ {{ details.fileName }}</zx-button>
  </zx-button-controls>
</zx-inline>
