<zx-picture-gallery-host></zx-picture-gallery-host>

<div class="selectors">
  <div class="selectors-top">
    <zx-sort-select
      labelKey="picture-browser.sorting"
      [options]="sortingOptions"
      [value]="sorting"
      (valueChange)="onSortingChange($event)"
    ></zx-sort-select>
  </div>
</div>

<div *ngIf="loading" zxPicturesGrid>
  <zx-picture-card-skeleton
    *ngFor="let i of skeletonItems"
    [animationDelayMs]="i * 80"
  ></zx-picture-card-skeleton>
</div>

<div *ngIf="error" zxCaption>{{ 'picture-browser.error' | translate }}</div>
<div *ngIf="!loading && !error && pictures.length === 0" zxCaption>{{ 'picture-browser.empty' | translate }}</div>

<div *ngIf="!loading && !error && pictures.length > 0" zxPicturesGrid>
  <zx-picture-card
    *ngFor="let pic of pictures; let i = index"
    [picture]="pic"
    [galleryIndex]="i"
    [galleryId]="galleryId"
  ></zx-picture-card>
</div>

<zx-pagination
  *ngIf="pagesAmount > 1"
  [currentPage]="currentPage"
  [pagesAmount]="pagesAmount"
  [urlBase]="urlBase"
  [loading]="loading"
  (pageChange)="onPageChange($event)"
></zx-pagination>
