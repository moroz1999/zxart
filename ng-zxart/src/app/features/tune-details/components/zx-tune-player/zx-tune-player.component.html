<zx-panel padding="md">
  <zx-stack spacing="md">
    <!-- Oscilloscope / spectral analyser — stub until wired separately. -->
    <div class="tp-stage">
      <span appText="caption" tone="muted">{{ 'tune-details.analyser-stub' | translate }}</span>
    </div>

    <zx-inline align="center" spacing="md" [wrap]="true">
      <zx-button color="primary" [disabled]="true">
        {{ 'tune-details.listen' | translate }}
      </zx-button>
      <span appText="caption" tone="muted">
        {{ tune.format }}<span *ngIf="tune.duration"> · {{ tune.duration }}</span>
      </span>
    </zx-inline>

    <div class="tp-progress" aria-hidden="true">
      <div class="tp-progress__fill"></div>
    </div>
  </zx-stack>
</zx-panel>
