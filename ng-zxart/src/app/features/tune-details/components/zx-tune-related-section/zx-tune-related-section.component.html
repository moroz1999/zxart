<div [appInViewport]="!loaded && !loading" (inViewport)="onInViewport()">
  <zx-grid *ngIf="rails.length" [desktopColumns]="'3'" [tabletColumns]="'2'" [mobileColumns]="'1'" gap="lg" align="start">
    <zx-panel *ngFor="let rail of rails">
      <zx-stack spacing="sm">
        <h3 appHeading="title">{{ railTitleKey(rail.kind) | translate }}</h3>
        <a
          *ngFor="let item of rail.items"
          class="tn-mini"
          [href]="item.url"
        >
          <zx-inline align="center" spacing="sm" [wrap]="false">
            <span class="tn-mini__body">
              <span appText="bodySm" tone="strong" [truncate]="true">{{ item.title }}</span>
              <span *ngIf="item.authors.length" appText="caption" tone="muted" [truncate]="true">
                {{ authorNames(item.authors) }}
              </span>
            </span>
            <zx-party-place *ngIf="item.party" [place]="item.party.place"></zx-party-place>
            <span *ngIf="item.year" class="tn-mini__year" appText="caption" tone="link-alt">{{ item.year }}</span>
          </zx-inline>
        </a>
      </zx-stack>
    </zx-panel>
  </zx-grid>
</div>
