<zx-table size="sm" [title]="title">
  <table>
    <thead>
      <tr>
        <th class="col-rank"></th>
        <th class="col-user">{{ 'stats.top.user' | translate }}</th>
        <th class="col-count">{{ unitKey | translate }}</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users; let i = index">
        <td class="col-rank">
          <zx-medal *ngIf="medalVariant(i) as variant; else plainRank" [variant]="variant">{{ i + 1 }}</zx-medal>
          <ng-template #plainRank><span class="zx-stats-top-table__rank">{{ i + 1 }}</span></ng-template>
        </td>
        <td class="col-user">
          <span class="zx-stats-top-table__user">
            <zx-badge *ngIf="user.badge === 'vip'" variant="primary" class="zx-stats-top-table__badge" title="VIP">★</zx-badge>
            <zx-badge *ngIf="user.badge === 'volunteer'" variant="secondary" class="zx-stats-top-table__badge" title="Volunteer">✓</zx-badge>
            <a *ngIf="user.url; else plainName" class="zx-stats-top-table__name" [href]="user.url">{{ user.name }}</a>
            <ng-template #plainName><span class="zx-stats-top-table__name zx-stats-top-table__name--plain">{{ user.name }}</span></ng-template>
          </span>
        </td>
        <td class="col-count">{{ user.count | number }}</td>
      </tr>
    </tbody>
  </table>
</zx-table>
