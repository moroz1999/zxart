<ng-container *ngIf="(loaded$ | async); else skeleton">
  <zx-stack *ngIf="vm$ | async as vm" gap="lg">
    <zx-grid desktopColumns="3" tabletColumns="3" mobileColumns="1" gap="md">
      <zx-panel padding="md">
        <zx-stack gap="xs">
          <div appHeading="title" class="zx-stats-category__kpi-value">{{ vm.section.totalWorks | number }}</div>
          <div appLabel tone="muted" class="zx-stats-category__kpi-label">{{ 'stats.total.' + category | translate }}</div>
        </zx-stack>
      </zx-panel>
      <zx-panel padding="md">
        <zx-stack gap="xs">
          <div appHeading="title" class="zx-stats-category__kpi-value">{{ vm.section.peakYear }}</div>
          <div appLabel tone="muted" class="zx-stats-category__kpi-label">{{ 'stats.kpi.peak' | translate }}</div>
        </zx-stack>
      </zx-panel>
      <zx-panel padding="md">
        <zx-stack gap="xs">
          <div appHeading="title" class="zx-stats-category__kpi-value">{{ vm.section.dailyTotal | number }}</div>
          <div appLabel tone="muted" class="zx-stats-category__kpi-label">{{ 'stats.kpi.daily30' | translate }}</div>
        </zx-stack>
      </zx-panel>
    </zx-grid>

    <zx-panel [title]="'stats.year.' + category | translate">
      <zx-stack gap="md">
        <zx-inline gap="lg" [wrap]="true">
          <zx-inline *ngFor="let dataset of vm.yearDatasets" align="center" gap="xs">
            <i class="zx-stats-category__legend-swatch" [ngClass]="dataset.colorClass"></i>
            <span appText="caption" tone="muted">{{ dataset.label }}</span>
          </zx-inline>
        </zx-inline>
        <zx-stats-bar-chart [labels]="vm.yearLabels" [datasets]="vm.yearDatasets" [stacked]="true" height="lg"></zx-stats-bar-chart>
      </zx-stack>
    </zx-panel>

    <zx-panel [title]="'stats.section.avg' | translate">
      <zx-stats-line-chart [labels]="vm.avgLabels" [data]="vm.avgData" [color]="vm.avgColor" [fill]="vm.avgFill" height="md"></zx-stats-line-chart>
    </zx-panel>

    <zx-panel *ngFor="let distribution of vm.distributions" [title]="distribution.title | translate">
      <zx-stats-bar-chart [labels]="distribution.labels" [datasets]="distribution.datasets" [stacked]="true" [interactiveLegend]="true" height="lg"></zx-stats-bar-chart>
    </zx-panel>

    <zx-panel [title]="(vm.section.daily.labelKey | translate) + ' · ' + ('stats.days30' | translate)">
      <zx-stats-bar-chart [labels]="vm.dailyLabels" [datasets]="vm.dailyDatasets" height="sm"></zx-stats-bar-chart>
    </zx-panel>

    <zx-stats-top-table
      [title]="'stats.top_title.' + category | translate"
      [unitKey]="vm.section.topUnitKey"
      [users]="vm.section.top"
    ></zx-stats-top-table>
  </zx-stack>
</ng-container>

<ng-template #skeleton>
  <zx-stats-section-skeleton></zx-stats-section-skeleton>
</ng-template>
