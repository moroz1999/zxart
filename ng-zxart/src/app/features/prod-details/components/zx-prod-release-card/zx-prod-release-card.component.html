<zx-panel padding="none" [contentBleed]="true">
  <div class="release-card__layout">
    <a [href]="release.url" class="release-card__cover">
      <zx-card-screenshot-gallery
        *ngIf="screenshotUrls.length > 0"
        [imageUrls]="screenshotUrls"
        [alt]="release.title"
      ></zx-card-screenshot-gallery>
    </a>

    <zx-inset class="release-card__body" padding="md">
      <a [href]="release.url" class="release-card__title">{{ release.title }}</a>

      <div *ngIf="release.releaseBy.length || release.year > 0" class="release-card__meta">
        <ng-container *ngFor="let g of release.releaseBy; let last = last">
          {{ g.title }}<ng-container *ngIf="!last">, </ng-container>
        </ng-container>
        <ng-container *ngIf="release.year > 0">
          <ng-container *ngIf="release.releaseBy.length"> · </ng-container>
          {{ release.year }}
        </ng-container>
      </div>

      <zx-inline gap="xs" align="center" justify="between" [wrap]="true">
        <zx-release-type-badge
          *ngIf="release.releaseType"
          [type]="release.releaseType"
          [label]="release.releaseTypeLabel"
        ></zx-release-type-badge>
        <zx-prod-language-links [languages]="release.languages"></zx-prod-language-links>
        <zx-chip *ngFor="let fmt of release.formats" variant="filled" color="neutral">{{ fmt.label }}</zx-chip>
      </zx-inline>

      <zx-inline class="release-card__bottom" gap="sm" align="center">
        <zx-button *ngIf="canPlay" size="sm" color="secondary" (click)="onPlay()">
          {{ 'release-row.play' | translate }}
        </zx-button>
        <zx-inline *ngIf="release.isDownloadable" gap="xs" align="center" class="release-card__stats">
          <zx-inline gap="xs" align="center" class="release-card__stat">
            <svg-icon class="release-card__stat-icon" name="download"></svg-icon>{{ release.downloadsCount }}
          </zx-inline>
          <zx-inline gap="xs" align="center" class="release-card__stat">
            <svg-icon class="release-card__stat-icon" name="play"></svg-icon>{{ release.playsCount }}
          </zx-inline>
        </zx-inline>
      </zx-inline>

      <zx-item-controls
        [elementId]="release.id"
        type="zxRelease"
        [votes]="release.voting.votes"
        [votesAmount]="release.voting.votesAmount"
        [userRating]="release.voting.userVote"
        [denyVoting]="release.voting.denyVoting">
      </zx-item-controls>
    </zx-inset>
  </div>
</zx-panel>
