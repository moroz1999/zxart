<div
  class="prod-inlays-section"
  [appInViewport]="!loaded && !loading"
  (inViewport)="onInViewport()"
>
  <ng-container *ngIf="loading || (loaded && inlays.length > 0)">
    <h2 zxHeading2 class="prod-inlays-section__title">{{ 'prod-details.inlays' | translate }}</h2>

    <zx-picture-grid-skeleton *ngIf="loading" [count]="2"></zx-picture-grid-skeleton>

    <ng-container *ngIf="loaded && inlays.length > 0">
      <zx-picture-gallery-host></zx-picture-gallery-host>

      <div class="prod-inlays-section__grid">
        <figure
          *ngFor="let inlay of inlays; let i = index"
          class="prod-inlays-section__item"
        >
          <img
            *ngIf="inlay.imageUrl"
            class="prod-inlays-section__thumb"
            loading="lazy"
            [src]="inlay.imageUrl"
            [alt]="inlay.title"
            [lightbox]="i"
            [gallery]="galleryId"
          />
          <figcaption zxCaption>
            <a [href]="inlay.releaseUrl">{{ buildReleaseLabel(inlay) }}</a>
          </figcaption>
        </figure>
      </div>
    </ng-container>
  </ng-container>
</div>
