<zx-stack spacing="md">
  <ng-container *ngIf="prods$ | async as prods; else loading">
    <ng-container *ngIf="prods.length > 0">
      <zx-inline spacing="sm" align="baseline" [wrap]="true">
        <h2 appHeading="headline">{{ 'prod-details.series' | translate }}</h2>
        <zx-button
          *ngIf="seriesUrl$ | async as seriesUrl"
          size="xs"
          color="outlined"
          [href]="seriesUrl"
        >{{ 'prod-details.openSeries' | translate }}</zx-button>
      </zx-inline>
      <zx-prods-list-view
        [items$]="prods$"
        property="seriesProds"
        [skeletonCount]="4"
      ></zx-prods-list-view>
    </ng-container>
  </ng-container>
</zx-stack>

<ng-template #loading>
  <zx-inline spacing="sm" align="baseline" [wrap]="true">
    <h2 appHeading="headline">{{ 'prod-details.series' | translate }}</h2>
  </zx-inline>
  <zx-prods-list-skeleton [count]="4"></zx-prods-list-skeleton>
</ng-template>
