<div
  [appInViewport]="!loaded && !loading"
  (inViewport)="onInViewport()"
>
  <zx-stack *ngIf="loaded && files.length > 0" spacing="xs">
    <zx-instruction-file-card
      *ngFor="let file of files; trackBy: trackById"
      [file]="file"
      [showReleaseInfo]="true"
    ></zx-instruction-file-card>
  </zx-stack>
</div>
