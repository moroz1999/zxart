<ng-container *ngIf="{ prods: prods$ | async } as vm">
  <ng-container *ngIf="vm.prods === null || vm.prods.length > 0">
    <h2 appHeading="headline">{{ 'prod-details.compilations' | translate }}</h2>
    <zx-prods-list-view [items$]="prods$" property="compilations" [skeletonCount]="4"></zx-prods-list-view>
  </ng-container>
</ng-container>
