<zx-stack
  spacing="md"
  [appInViewport]="!loaded && !loading"
  (inViewport)="onInViewport()"
>
  <ng-container *ngIf="loading || (loaded && files.length > 0)">
    <h2 appHeading="headline">{{ 'prod-details.rzx' | translate }}</h2>
    <zx-row-skeleton *ngIf="loading" [count]="2"></zx-row-skeleton>
    <zx-panel
      *ngIf="loaded && files.length > 0"
      class="prod-rzx-section__panel"
      variant="flat"
      padding="sm"
    >
      <zx-prod-files-list [files]="files"></zx-prod-files-list>
    </zx-panel>
  </ng-container>
</zx-stack>
