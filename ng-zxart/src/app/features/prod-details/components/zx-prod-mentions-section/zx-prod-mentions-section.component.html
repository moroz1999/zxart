<zx-stack
  spacing="md"
  [appInViewport]="!loaded && !loading"
  (inViewport)="onInViewport()"
>
  <ng-container *ngIf="loading || (loaded && mentions.length > 0)">
    <h2 appHeading="headline">{{ 'prod-details.mentions' | translate }}</h2>

    <zx-comment-skeleton *ngIf="loading" [count]="2"></zx-comment-skeleton>

    <zx-stack *ngIf="loaded && mentions.length > 0" spacing="lg">
      <zx-article-preview
        *ngFor="let article of mentions; trackBy: trackById"
        [title]="article.title"
        [url]="article.url"
        [snippetHtml]="article.introduction || null"
        [authors]="article.authors"
        [publication]="article.publication"
        [imageUrl]="article.publication?.imageUrl || null"
        [imageAlt]="article.publication?.title || article.title"
        [readLinkLabel]="'prod-details.readArticle' | translate"
      ></zx-article-preview>
    </zx-stack>
  </ng-container>
</zx-stack>
