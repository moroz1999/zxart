<ng-container *ngIf="core$ | async as core; else loading">
  <div class="prod-details">
    <zx-prod-editing-controls
      [elementId]="core.elementId"
      [prodUrl]="core.prodUrl"
      [privileges]="core.privileges">
    </zx-prod-editing-controls>
    <h1 class="prod-details__title">{{ core.h1 }}</h1>
    <zx-prod-info-table [core]="core"></zx-prod-info-table>
  </div>
</ng-container>

<ng-template #loading>
  <zx-skeleton variant="card" [count]="3"></zx-skeleton>
</ng-template>
