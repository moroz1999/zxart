<zx-inline gap="sm" align="center">
  <zx-item-controls
    [elementId]="elementId"
    [type]="type"
    [votes]="voting.votes"
    [votesAmount]="voting.votesAmount"
    [userRating]="voting.userVote"
    [denyVoting]="voting.denyVoting">
  </zx-item-controls>
  <div *ngIf="!voting.denyVoting && voting.votePercent != null" appText="label" tone="muted" class="prod-vote-row__percent">{{ voting.votes }}</div>
</zx-inline>
