<ng-container *ngIf="{ prods: prods$ | async } as vm">
  <ng-container *ngIf="vm.prods === null || vm.prods.length > 0">
    <h2 zxHeading2 class="prod-related-section__title">{{ 'prod-details.compilationItems' | translate }}</h2>
    <zx-prods-list-view [items$]="prods$" property="prods" [skeletonCount]="4"></zx-prods-list-view>
  </ng-container>
</ng-container>
