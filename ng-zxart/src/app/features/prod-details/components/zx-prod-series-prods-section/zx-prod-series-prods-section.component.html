<ng-container *ngIf="{ prods: prods$ | async } as vm">
  <ng-container *ngIf="vm.prods === null || vm.prods.length > 0">
    <zx-stack spacing="md">
      <h2 appHeading="headline">{{ 'prod-details.seriesProds' | translate }}</h2>
      <zx-prods-list-view [items$]="prods$" property="seriesProds" [skeletonCount]="4"></zx-prods-list-view>
    </zx-stack>
  </ng-container>
</ng-container>
