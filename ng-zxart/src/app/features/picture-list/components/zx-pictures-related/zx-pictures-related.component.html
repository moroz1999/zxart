<ng-container *ngIf="type !== 'none' && pictures.length > 0">
  <zx-picture-gallery-host></zx-picture-gallery-host>
  <h2>{{ (type === 'game' ? 'picture.morefromgame' : 'picture.morefromauthor') | translate }}</h2>
  <div zxPicturesGrid>
    <zx-picture-card
      *ngFor="let pic of pictures; let i = index"
      [picture]="pic"
      [galleryIndex]="i"
      [galleryId]="galleryId"
    ></zx-picture-card>
  </div>
</ng-container>
