<zx-picture-gallery-host></zx-picture-gallery-host>

<zx-picture-grid-skeleton *ngIf="loading" [count]="6"></zx-picture-grid-skeleton>

<div *ngIf="error" zxCaption>{{ 'firstpage.error' | translate }}</div>

<div *ngIf="!loading && !error && pictures.length > 0" zxPicturesGrid>
  <zx-picture-card
    *ngFor="let pic of pictures; let i = index"
    [picture]="pic"
    [galleryIndex]="i"
    [galleryId]="galleryId"
  ></zx-picture-card>
</div>
