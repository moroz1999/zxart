<zx-button
  cdkOverlayOrigin
  #trigger="cdkOverlayOrigin"
  color="transparent"
  size="sm"
  [ariaLabel]="'header.language-trigger.label' | translate"
  [attr.aria-expanded]="popoverOpen"
  (click)="togglePopover($event)"
>
  <span class="lt-flag">{{ activeLanguage?.flag }}</span>
  <span class="lt-label">{{ activeLanguage?.title }}</span>
</zx-button>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="trigger"
  [cdkConnectedOverlayOpen]="popoverOpen"
  [cdkConnectedOverlayPositions]="positions"
  [cdkConnectedOverlayHasBackdrop]="true"
  cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
  (backdropClick)="closePopover()"
  (overlayKeydown)="onOverlayKeydown($event)"
>
  <zx-header-popover (click)="$event.stopPropagation()">
    <zx-popover-menu-item
      *ngFor="let lang of languages"
      [href]="lang.url"
      [active]="lang.active"
    >{{ lang.flag }} {{ lang.title }}</zx-popover-menu-item>
  </zx-header-popover>
</ng-template>
