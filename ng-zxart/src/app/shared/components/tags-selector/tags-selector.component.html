<ng-container *ngIf="vm$ | async as vm">
    <zx-tags-chips
        *ngIf="tagsSelector.length > 0"
        [tags]="tagsSelector"
        [removable]="true"
        [removeButtonAriaLabel]="'tags-quick-form.remove-tag' | translate"
        (tagRemoved)="remove($event)"
    ></zx-tags-chips>

    <zx-input
        #zxInput
        cdkOverlayOrigin
        #tagInputOrigin="cdkOverlayOrigin"
        [placeholder]="'prods-list.filters.tags.select' | translate"
        [(ngModel)]="tagText"
        (ngModelChange)="change($event)"
    ></zx-input>

    <ng-template
        cdkConnectedOverlay
        [cdkConnectedOverlayOrigin]="tagInputOrigin"
        [cdkConnectedOverlayOpen]="vm.dropdownOpen"
        [cdkConnectedOverlayPositions]="positions"
        [cdkConnectedOverlayHasBackdrop]="true"
        cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
        (backdropClick)="closeDropdown()"
    >
        <div class="tags-dropdown">
            <div *ngFor="let tag of vm.foundTags" (click)="selectTag(tag)" class="tags-option">
                {{ tag.title }}
            </div>
        </div>
    </ng-template>
</ng-container>
