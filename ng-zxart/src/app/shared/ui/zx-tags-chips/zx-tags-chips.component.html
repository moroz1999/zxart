<ng-container *ngFor="let tag of tags">
  <a *ngIf="tag.url" [href]="tag.url" class="zx-tags-chips__chip zx-tags-chips__chip--link">{{ tag.title }}</a>
  <div *ngIf="!tag.url" class="zx-tags-chips__chip">
    <span>{{ tag.title }}</span>
    <button
      *ngIf="removable"
      type="button"
      class="zx-tags-chips__remove"
      [disabled]="disabled"
      [attr.aria-label]="removeButtonAriaLabel || null"
      (click)="onRemove(tag)"
    >
      <svg-icon class="zx-tags-chips__remove-icon" name="cancel"></svg-icon>
    </button>
  </div>
</ng-container>
