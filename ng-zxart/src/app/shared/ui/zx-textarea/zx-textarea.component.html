<div class="zx-textarea">
  <label *ngIf="label" class="zx-textarea__label">{{ label }}</label>
  <textarea
    class="zx-textarea__field"
    [placeholder]="placeholder"
    [rows]="rows"
    [disabled]="disabled"
    [value]="value"
    (input)="onInput($event)"
    (blur)="onBlur()"
  ></textarea>
  <span *ngIf="errorMessage" class="zx-textarea__error">{{ errorMessage }}</span>
</div>
