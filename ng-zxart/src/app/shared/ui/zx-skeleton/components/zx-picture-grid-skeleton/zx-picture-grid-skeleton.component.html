@for (i of items; track i) {
  <div class="skeleton-picture-card" [style.animation-delay.ms]="i * 80">
    <zx-skeleton-bone class="skeleton-picture-image" [animated]="animated"></zx-skeleton-bone>
    <div class="skeleton-picture-body">
      <zx-skeleton-bone class="skeleton-title" [animated]="animated"></zx-skeleton-bone>
      <zx-skeleton-bone class="skeleton-text" [animated]="animated"></zx-skeleton-bone>
    </div>
  </div>
}
