<zx-stack spacing="xl" class="skeleton-prod-details">
  <zx-breadcrumbs [loading]="true"></zx-breadcrumbs>

  <zx-skeleton-bone class="skeleton-prod-details-title" [animated]="animated"></zx-skeleton-bone>

  <zx-inline class="skeleton-prod-details-hero" gap="xl" align="start" [wrap]="true">
    <zx-skeleton-bone class="skeleton-prod-details-cover" [animated]="animated"></zx-skeleton-bone>

    <zx-stack spacing="md" class="skeleton-prod-details-info">
      <zx-inline gap="md" align="baseline" [wrap]="true">
        <zx-skeleton-bone class="skeleton-prod-details-title" [animated]="animated"></zx-skeleton-bone>
        <zx-skeleton-bone class="skeleton-prod-details-year" [animated]="animated"></zx-skeleton-bone>
      </zx-inline>

      <zx-skeleton-bone class="skeleton-prod-details-alt-title" [animated]="animated"></zx-skeleton-bone>

      <zx-inline gap="sm" [wrap]="true">
        @for (chip of chips; track chip) {
          <zx-skeleton-bone
            class="skeleton-prod-details-chip"
            [animated]="animated"
            [style.animation-delay.ms]="chip * 50"
          ></zx-skeleton-bone>
        }
      </zx-inline>

      <zx-inline gap="lg" align="center" justify="between" [wrap]="true">
        <zx-skeleton-bone class="skeleton-prod-details-vote" [animated]="animated"></zx-skeleton-bone>
        <zx-skeleton-bone class="skeleton-prod-details-added" [animated]="animated"></zx-skeleton-bone>
      </zx-inline>

      <zx-stack spacing="xs">
        @for (line of peopleLines; track line) {
          <zx-skeleton-bone
            class="skeleton-prod-details-people-line"
            [animated]="animated"
            [style.animation-delay.ms]="line * 60"
          ></zx-skeleton-bone>
        }
      </zx-stack>

      <zx-inline gap="md" align="center" [wrap]="true">
        @for (link of links; track link) {
          <zx-skeleton-bone
            class="skeleton-prod-details-link"
            [animated]="animated"
            [style.animation-delay.ms]="link * 50"
          ></zx-skeleton-bone>
        }
      </zx-inline>
    </zx-stack>
  </zx-inline>

  <zx-panel padding="md" variant="elevated">
    <zx-stack spacing="md">
      <zx-skeleton-bone class="skeleton-prod-details-section-title" [animated]="animated"></zx-skeleton-bone>
      <zx-screenshot-grid-skeleton [count]="3" [animated]="animated"></zx-screenshot-grid-skeleton>
    </zx-stack>
  </zx-panel>

  <zx-panel variant="elevated">
    <zx-stack spacing="md">
      <zx-skeleton-bone class="skeleton-prod-details-section-title" [animated]="animated"></zx-skeleton-bone>
      <zx-stack spacing="sm">
        @for (line of descriptionLines; track line) {
          <zx-skeleton-bone
            class="skeleton-prod-description-line"
            [animated]="animated"
            [style.animation-delay.ms]="line * 80"
          ></zx-skeleton-bone>
        }
      </zx-stack>
      <zx-inline class="skeleton-prod-details-tags" gap="sm" align="start" [wrap]="true">
        <zx-skeleton-bone class="skeleton-prod-details-tags-label" [animated]="animated"></zx-skeleton-bone>
        @for (tag of tags; track tag) {
          <zx-skeleton-bone
            class="skeleton-prod-details-tag"
            [animated]="animated"
            [style.animation-delay.ms]="tag * 40"
          ></zx-skeleton-bone>
        }
      </zx-inline>
    </zx-stack>
  </zx-panel>

  <section class="skeleton-prod-details-tabs">
    <zx-inline class="skeleton-prod-details-tabs-bar" gap="none">
      @for (tab of tabs; track tab) {
        <zx-skeleton-bone
          class="skeleton-prod-details-tab"
          [animated]="animated"
          [style.animation-delay.ms]="tab * 50"
        ></zx-skeleton-bone>
      }
    </zx-inline>

    <zx-grid desktopColumns="5" mobileColumns="1" gap="xl" align="start">
      <zx-panel zxGridItem zxGridDesktopSpan="2" variant="elevated">
        <zx-stack spacing="lg">
          <zx-skeleton-bone class="skeleton-prod-details-section-title" [animated]="animated"></zx-skeleton-bone>
          <zx-row-skeleton [count]="3" [animated]="animated"></zx-row-skeleton>
        </zx-stack>
      </zx-panel>

      <zx-panel zxGridItem zxGridDesktopSpan="3" variant="elevated">
        <zx-stack spacing="lg">
          <zx-inline gap="md" align="center">
            <zx-skeleton-bone class="skeleton-prod-details-section-title" [animated]="animated"></zx-skeleton-bone>
            <zx-skeleton-bone class="skeleton-prod-details-tab" [animated]="animated"></zx-skeleton-bone>
          </zx-inline>
          <zx-comment-skeleton [count]="3" [animated]="animated"></zx-comment-skeleton>
        </zx-stack>
      </zx-panel>
    </zx-grid>
  </section>
</zx-stack>
