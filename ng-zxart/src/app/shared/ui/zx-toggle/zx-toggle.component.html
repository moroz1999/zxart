<div [class]="'zx-toggle zx-toggle--' + size">
  <button
    *ngFor="let option of options"
    type="button"
    class="zx-toggle__item"
    [class.zx-toggle__item--active]="value === option.value"
    (click)="onValueChange(option.value)"
  >
    <svg-icon *ngIf="option.icon" [name]="option.icon"></svg-icon>
    <span *ngIf="option.label">{{ option.label }}</span>
  </button>
</div>
