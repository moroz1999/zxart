<zx-panel radius="xl" padding="none" variant="elevated">
  <a class="zx-prod-card__link" [href]="data.url">
    <div class="zx-prod-card__image-wrap">
      <img
        *ngIf="data.imageUrl; else placeholder"
        class="zx-prod-card__image"
        [src]="data.imageUrl"
        [alt]="data.title"
        loading="lazy"
      />
      <ng-template #placeholder>
        <div class="zx-prod-card__image-placeholder"></div>
      </ng-template>
      <zx-badge
        *ngIf="showLegalBadge"
        class="zx-prod-card__legal"
        variant="secondary"
      >{{ data.legalStatusLabel }}</zx-badge>
    </div>
    <div class="zx-prod-card__body">
      <span class="zx-prod-card__title" zxBody>{{ data.title }}</span>
      <div class="zx-prod-card__meta" zxBodySmMuted>
        <span *ngIf="data.year" class="zx-prod-card__year">{{ data.year }}</span>
        <span
          *ngIf="data.votesAmount > 0"
          class="zx-prod-card__votes"
        >{{ data.votes | number: '1.1-1' }} ({{ data.votesAmount }})</span>
      </div>
    </div>
  </a>
</zx-panel>
