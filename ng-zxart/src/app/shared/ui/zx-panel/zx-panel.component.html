<ng-container *ngIf="title">
  <h2 *ngIf="titleLevel === 'h2'; else h3Title" appHeading="headline" class="zx-panel__title">{{ title }}</h2>
  <ng-template #h3Title>
    <h3 appHeading="title" class="zx-panel__title">{{ title }}</h3>
  </ng-template>
</ng-container>
<div class="zx-panel__body">
  <ng-content></ng-content>
</div>
