<zx-dialog [title]="data.title" (closeClick)="close()">
  <div class="file-viewer-dialog__body">
    <ng-container *ngIf="isPdf">
      <ngx-extended-pdf-viewer
        [src]="data.downloadUrl || ''"
        [showToolbar]="true"
        [showSidebarButton]="false"
        [showFindButton]="true"
        [showPagingButtons]="true"
        [showZoomButtons]="true"
        [showPresentationModeButton]="false"
        [showOpenFileButton]="false"
        [showPrintButton]="true"
        [showDownloadButton]="true"
        [showSecondaryToolbarButton]="false"
        height="75vh">
      </ngx-extended-pdf-viewer>
    </ng-container>

    <ng-container *ngIf="!isPdf && (content$ | async) as state">
      <div *ngIf="state.loading" class="file-viewer-dialog__loading">{{ 'prod-details.instructions-loading' | translate }}</div>
      <ng-container *ngIf="!state.loading && state.content !== null">
        <div *ngIf="isHtml; else textContent" class="file-viewer-dialog__html" [innerHTML]="state.content"></div>
        <ng-template #textContent>
          <pre class="file-viewer-dialog__text">{{ state.content }}</pre>
        </ng-template>
      </ng-container>
      <p *ngIf="!state.loading && state.error" class="file-viewer-dialog__error">{{ 'prod-details.instructions-error' | translate }}</p>
    </ng-container>
  </div>
</zx-dialog>
