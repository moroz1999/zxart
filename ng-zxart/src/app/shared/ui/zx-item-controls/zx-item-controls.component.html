@if (!denyVoting) {
  @if (state$ | async; as state) {
    <zx-rating
      [overallRating]="state.overallRating"
      [votesAmount]="state.votesAmount"
      [userRating]="state.userRating"
      (voted)="onVote($event)"
    ></zx-rating>
  }
}
<zx-playlist-button [elementId]="elementId"></zx-playlist-button>
