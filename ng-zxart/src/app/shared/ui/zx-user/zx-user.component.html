<svg-icon
  *ngFor="let badge of user.badges"
  class="zx-user__badge"
  [ngClass]="getBadgeClass(badge)"
  [name]="getIconName(badge)"
></svg-icon>

<a *ngIf="user.url && !linkDisabled; else noUrl" [href]="user.url" appText="caption" tone="link" class="zx-user__name">
  {{ user.name }}
</a>
<ng-template #noUrl>
  <span appText="caption" [tone]="namePrimary ? 'primary' : 'muted'" class="zx-user__name">{{ user.name }}</span>
</ng-template>
