<svg-icon
  *ngFor="let badge of user.badges"
  class="zx-user__badge"
  [ngClass]="getBadgeClass(badge)"
  [name]="getIconName(badge)"
></svg-icon>

<a *ngIf="user.url && !linkDisabled; else noUrl" [href]="user.url" zxLink zxCaption class="zx-user__name">
  {{ user.name }}
</a>
<ng-template #noUrl>
  <span zxCaption class="zx-user__name">{{ user.name }}</span>
</ng-template>
