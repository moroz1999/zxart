<zx-stack spacing="xxl">
  <zx-picture-gallery-host></zx-picture-gallery-host>

  <zx-inline justify="between" align="center">
    <h1 zxHeading1>{{ 'firstpage.title' | translate }}</h1>
    <zx-button color="secondary" (click)="openConfig()">
      <svg-icon name="settings" class="fp-config-icon"></svg-icon>
      {{ 'firstpage.configure' | translate }}
    </zx-button>
  </zx-inline>

  <ng-container *ngFor="let entry of modules$ | async">
    <ng-container
      *ngComponentOutlet="entry.component; injector: entry.injector"
    ></ng-container>
  </ng-container>
</zx-stack>
