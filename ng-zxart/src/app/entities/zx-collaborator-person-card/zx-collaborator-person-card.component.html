<a [href]="person.url" class="person-card">
  <div class="person-card__avatar">
    <svg-icon name="person" aria-hidden="true" class="person-card__avatar-icon"></svg-icon>
  </div>
  <div class="person-card__body">
    <span appText="bodySm" tone="strong" [truncate]="true">{{ person.title }}</span>

    <div class="person-card__stats" *ngIf="hasStats">
      <span *ngIf="(person.jointPictures ?? 0) > 0" class="person-card__stat person-card__stat--gfx">
        <svg-icon name="image" aria-hidden="true" class="person-card__stat-icon"></svg-icon>
        <span appText="caption">{{ person.jointPictures }}</span>
      </span>
      <span *ngIf="(person.jointTunes ?? 0) > 0" class="person-card__stat person-card__stat--music">
        <svg-icon name="music-note" aria-hidden="true" class="person-card__stat-icon"></svg-icon>
        <span appText="caption">{{ person.jointTunes }}</span>
      </span>
      <span *ngIf="(person.jointProds ?? 0) > 0" class="person-card__stat person-card__stat--soft">
        <svg-icon name="gamepad" aria-hidden="true" class="person-card__stat-icon"></svg-icon>
        <span appText="caption">{{ person.jointProds }}</span>
      </span>
    </div>

    <div *ngIf="person.roles?.length" class="person-card__roles" appText="caption" tone="muted" [truncate]="true">
      <ng-container *ngFor="let role of person.roles; let last = last">{{ roleLabelKey(role) | translate }}<ng-container *ngIf="!last">, </ng-container></ng-container>
    </div>
  </div>
  <div class="person-card__total">
    <span appHeading="title" class="person-card__total-value">{{ person.jointTotal }}</span>
    <span appText="caption" tone="muted">{{ 'collaborators.joint' | translate }}</span>
  </div>
</a>
